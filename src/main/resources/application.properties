spring.application.name=roleflow
server.port=8080

# RoleFlow application options.
# When set, this system prompt is used for any /ask call or terminal prompt that does not supply one
# (only applies in plain mode when no roleflow.active workflow is loaded).
roleflow.system-prompt=
# Read prompts interactively from the terminal (stdin). Disabled automatically in tests.
roleflow.terminal.enabled=true
# Render goal/plan and audit links in terminal replies as clickable OSC 8 hyperlinks (supported by Windows
# Terminal, iTerm2, GNOME Terminal, etc.). Set false for terminals that show the escape codes as text.
roleflow.terminal.hyperlinks=true
# Open this prompt's audit trail web page in the default browser once per terminal session (like the web UI).
roleflow.terminal.open-audit=true
# Base URL of this app's web server, used to build the terminal's clickable links. Defaults to
# http://localhost:<server.port>; override if the server is reached at a different host/port.
roleflow.terminal.base-url=

# Role workflow. When this file is present and parses to one or more roles, every prompt (from the
# terminal and the web page) is driven through the roles instead of a single model call. See
# CURRENT_PROCESS.md for the flow. Remove/empty the file to fall back to plain single-call behavior.
roleflow.config=config/roleflow.active
# Directory where goal and plan files are written for requests.
roleflow.goals-dir=goals
# Safety cap on the number of role steps processed for a single prompt (prevents runaway loops). Set high
# enough for the PlanReviewer and PlanDetailReviewer/PlanDetailer refinement loops to run (the latter is
# itself capped by PlanDetailer's Iteration limit).
roleflow.max-steps=30

# Audit trail. Every role step (prompt, system prompt, model response, transition, clarification) is
# written to this log file (follow it with `tail -f`) and is viewable as a web page at
# /audit.html?prompt=<id>. See AuditInstructions.md. max-trails bounds how many recent runs are kept
# in memory for the web view.
roleflow.audit.log-file=audit.log
roleflow.audit.max-trails=50

# Default cap on the number of tokens generated per response when a request does not override it.
prompt.max-tokens=1024

# Conversation memory. Each prompt is sent with the context of earlier turns in the session. When the
# assembled request (system + summary + prior turns + new prompt) plus the reserved response space would
# exceed memory.max-tokens, the oldest turns are folded into a running summary (Claude Code-style
# auto-compaction). This keeps memory + the user prompt below memory.max-tokens at all times.
# MAX_TOKEN_SIZE for now is 8192; this will become more flexible in the future.
memory.max-tokens=8192
# Approximate characters per token, used for local size estimation (~4 for English text).
memory.chars-per-token=4
# Cap on the length of a generated summary when older turns are compacted.
memory.summary-max-tokens=1024

# Tool registry: the web_search tool (discoverable/usable via the internal MCP server at /mcp).
# See Tool_Registry.md. Outbound requests are made only when the tool is actually called.
web.search.duckduckgo-url=https://html.duckduckgo.com/html/
web.search.duckduckgo-lite-url=https://lite.duckduckgo.com/lite/
web.search.max-results=5
web.search.timeout-seconds=20
web.search.max-response-bytes=1048576
# How many web_search results PlanReviewer fetches as topic context (see roleflow.active "Research").
roleflow.research.max-results=3

# These llama-server settings intentionally match goalmaker.
llama.manage-server=true
llama.binary=
llama.profile=small
llama.hf-model=
llama.model-path=
llama.alias=qwen2.5-3b-instruct
llama.host=0.0.0.0
llama.port=8081
llama.client-host=127.0.0.1
llama.ctx-size=0
llama.gpu-layers=-1
llama.threads=0
llama.parallel=1
llama.extra-args=
llama.auto-restart=true
llama.health-interval-seconds=15
llama.cache-prompt=true
llama.cache-reuse=256
llama.draft-hf-model=
llama.draft-model-path=
llama.draft-tokens=16
llama.draft-gpu-layers=-1
