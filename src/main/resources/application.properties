spring.application.name=roleflow
server.port=8080

# RoleFlow application options.
# When set, this system prompt is used for any /ask call or terminal prompt that does not supply one.
roleflow.system-prompt=
# Read prompts interactively from the terminal (stdin). Disabled automatically in tests.
roleflow.terminal.enabled=true

# Default cap on the number of tokens generated per response when a request does not override it.
prompt.max-tokens=1024

# These llama-server settings intentionally match goalmaker.
llama.manage-server=true
llama.binary=
llama.profile=small
llama.hf-model=
llama.model-path=
llama.alias=qwen2.5-3b-instruct
llama.host=0.0.0.0
llama.port=8081
llama.client-host=127.0.0.1
llama.ctx-size=0
llama.gpu-layers=-1
llama.threads=0
llama.parallel=1
llama.extra-args=
llama.auto-restart=true
llama.health-interval-seconds=15
llama.cache-prompt=true
llama.cache-reuse=256
llama.draft-hf-model=
llama.draft-model-path=
llama.draft-tokens=16
llama.draft-gpu-layers=-1
