<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoleFlow</title>
    <style>
        :root { color-scheme: light dark; }
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            max-width: 760px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.5;
        }
        h1 { margin-bottom: 0.25rem; }
        p.subtitle { margin-top: 0; opacity: 0.7; }
        label { display: block; font-weight: 600; margin: 1rem 0 0.25rem; }
        textarea {
            width: 100%;
            box-sizing: border-box;
            font: inherit;
            padding: 0.5rem;
            border-radius: 6px;
            border: 1px solid #8884;
        }
        button {
            margin-top: 1rem;
            padding: 0.6rem 1.2rem;
            font: inherit;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: progress; }
        #response {
            white-space: pre-wrap;
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 6px;
            background: #8881;
            min-height: 2.5rem;
        }
        .error { color: #dc2626; }
    </style>
</head>
<body>
    <h1>RoleFlow</h1>
    <p class="subtitle">Send a prompt to the local llama-server.</p>

    <label for="system">System prompt (optional)</label>
    <textarea id="system" rows="2" placeholder="You are a helpful assistant."></textarea>

    <label for="prompt">Prompt</label>
    <textarea id="prompt" rows="5" placeholder="Ask me anything..."></textarea>

    <button id="send">Send</button>

    <div id="response" aria-live="polite"></div>

    <script>
        const sendButton = document.getElementById("send");
        const promptBox = document.getElementById("prompt");
        const systemBox = document.getElementById("system");
        const responseBox = document.getElementById("response");

        async function send() {
            const prompt = promptBox.value.trim();
            if (!prompt) {
                responseBox.textContent = "Please enter a prompt.";
                responseBox.classList.add("error");
                return;
            }
            responseBox.classList.remove("error");
            responseBox.textContent = "Thinking…";
            sendButton.disabled = true;
            try {
                const res = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt, system: systemBox.value.trim() || null })
                });
                const data = await res.json();
                if (!res.ok || data.error) {
                    responseBox.textContent = data.error || ("Request failed: " + res.status);
                    responseBox.classList.add("error");
                } else {
                    responseBox.textContent = data.response;
                }
            } catch (e) {
                responseBox.textContent = "Network error: " + e.message;
                responseBox.classList.add("error");
            } finally {
                sendButton.disabled = false;
            }
        }

        sendButton.addEventListener("click", send);
        // Ctrl/Cmd+Enter sends the prompt.
        promptBox.addEventListener("keydown", (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === "Enter") send();
        });
    </script>
</body>
</html>
