# imini lightweight Maven wrapper configuration.
#
# The wrapper (./mvnw and mvnw.cmd) lets you build with no system Maven installed: it prefers a Maven
# already on your PATH, and otherwise downloads this pinned Apache Maven once into .maven/ and uses it.
# This is a small, transparent wrapper (not the full Apache maven-wrapper.jar); teams that prefer the
# canonical wrapper can regenerate it with `mvn wrapper:wrapper`.
distributionVersion=3.9.9
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.9/apache-maven-3.9.9-bin.tar.gz
# Integrity check: SHA-512 of the archive above (Apache publishes SHA-512 for its binaries). The wrapper
# verifies every download against this and aborts on mismatch. This is the official 3.9.9 value (also used
# by the Docker `maven:3.9.9` image). Re-pin after a version bump with scripts/pin-maven-checksum.sh.
distributionSha512Sum=a555254d6b53d267965a3404ecb14e53c3827c09c3b94b5678835887ab404556bfaf78dcfe03ba76fa2508649dca8531c74bca4d5846513522404d48e8c4ac8b
